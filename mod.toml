[manifest]
id = "russian_language_mod"
version = "1.0.1"
display_name = "Russian Language Mod"
description = """A port of the Russian fan localization of Banjo-Kazooie for Banjo: Recompiled. The original Russian fan localization was created by KenshinX / Chief-Net © 2013

* Requires Asset Expansion Pak.
* Complete PAL-to-NTSC-U recoding of the Russian localization.
* Includes two selectable font styles: HD and Classic. HD is enabled by default; to select Classic, open "Configure". Third-party HD texture packs are recommended for the HD variant.
* The in-game text was recreated from scratch based on the original Russian localization, because it could not be directly transferred. All text is in Russian and has been carefully checked.
* To avoid crashes, the quiz texture was left in English, and one of the questions was made static.
* This is the first public release, so bugs may be present. However, most critical issues have already been fixed, and the game is fully playable."""
short_description = "A port of the Russian fan localization for Banjo-Kazooie"
authors = [ "gothplay3r" ]
game_id = "bk"
minimum_recomp_version = "1.0.1"
dependencies = [ "bk_recomp_asset_expansion_pak:0.0.3" ]
conflicts = [ "font_plus_latin_1" ]
optional_dependencies = []
native_libraries = []

[inputs]
elf_path = "build/mod.elf"
mod_filename = "Russian_Language_Mod_v1_0_1"
func_reference_syms_file = "BanjoRecompSyms/bk.us.rev0.syms.toml"
data_reference_syms_files = [ "BanjoRecompSyms/bk.us.rev0.datasyms.toml" ]
